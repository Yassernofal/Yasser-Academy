<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الاختبارات التفاعلية – Mr. Yasser Nofal Academy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0a2f6c;
      --secondary: #1a73e8;
      --accent: #f9a825;
      --light-bg: #f0f4fa;
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: var(--light-bg);
    }
    .navbar-custom {
      background: var(--primary) !important;
      padding: 12px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
    }
    .navbar-brand {
      font-weight: 800;
      font-size: 1.6rem;
      color: #fff !important;
    }
    .navbar-brand span { color: var(--accent); }
    .nav-link {
      color: #fff !important;
      font-weight: 500;
      transition: 0.3s;
    }
    .nav-link:hover {
      color: var(--accent) !important;
      transform: translateY(-2px);
    }
    .test-card {
      background: #fff;
      border-radius: 25px;
      padding: 30px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.06);
      max-width: 850px;
      margin: 0 auto;
    }
    .question-box {
      background: #f8f9fa;
      border-radius: 16px;
      padding: 25px;
      margin-bottom: 20px;
      border-right: 4px solid var(--secondary);
    }
    .btn-test {
      background: var(--secondary);
      color: #fff;
      border-radius: 50px;
      padding: 12px 40px;
      font-weight: 700;
      border: none;
      transition: 0.3s;
    }
    .btn-test:hover {
      background: var(--primary);
      transform: scale(1.02);
    }
    .btn-test-success {
      background: #28a745;
      color: #fff;
      border-radius: 50px;
      padding: 12px 40px;
      font-weight: 700;
      border: none;
      transition: 0.3s;
    }
    .btn-test-success:hover {
      background: #1e7e34;
      transform: scale(1.02);
    }
    .result-box {
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      color: #fff;
      border-radius: 25px;
      padding: 40px;
      text-align: center;
      display: none;
    }
    .result-box .score {
      font-size: 4rem;
      font-weight: 800;
    }
    footer {
      background: var(--primary);
      color: #ccc;
      padding: 35px 0;
      border-radius: 40px 40px 0 0;
      margin-top: 50px;
    }
    .form-check {
      padding: 8px 15px;
      border-radius: 10px;
      transition: 0.2s;
      cursor: pointer;
    }
    .form-check:hover {
      background: #e9ecef;
    }
    .form-check-input:checked + .form-check-label {
      color: var(--primary);
      font-weight: 700;
    }
  </style>
</head>
<body>

  <!-- ===== شريط التنقل ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-graduation-cap text-warning"></i> Mr. <span>Yasser</span> Nofal
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">🏠 الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="levels.html">📚 المستويات</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">🔑 تسجيل الدخول</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">📝 التسجيل</a></li>
          <li class="nav-item"><a class="nav-link" href="student-dashboard.html">👤 لوحة الطالب</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ===== المحتوى ===== -->
  <section class="container py-5">
    <h1 class="fw-bold text-center mb-4"><i class="fas fa-pencil-alt text-primary"></i> الاختبارات التفاعلية</h1>

    <div class="test-card">
      <div id="testContainer">
        <div class="d-flex justify-content-between align-items-center mb-3">
          <h5><i class="fas fa-clock text-primary"></i> <span id="timer">10:00</span></h5>
          <span id="questionCounter" class="badge bg-primary">1 / 10</span>
        </div>

        <div id="questionBox" class="question-box">
          <h5 id="questionText">ما هو الفعل الماضي لكلمة "go"؟</h5>
          <div class="mt-3" id="optionsContainer">
            <div class="form-check"><input class="form-check-input" type="radio" name="q1" value="0" /> <label class="form-check-label">Going</label></div>
            <div class="form-check"><input class="form-check-input" type="radio" name="q1" value="1" /> <label class="form-check-label">Went</label></div>
            <div class="form-check"><input class="form-check-input" type="radio" name="q1" value="2" /> <label class="form-check-label">Gone</label></div>
            <div class="form-check"><input class="form-check-input" type="radio" name="q1" value="3" /> <label class="form-check-label">Goes</label></div>
          </div>
        </div>

        <div class="d-flex justify-content-between mt-3">
          <button class="btn btn-outline-secondary" onclick="prevQuestion()"><i class="fas fa-arrow-right"></i> السابق</button>
          <button class="btn btn-primary" onclick="nextQuestion()">التالي <i class="fas fa-arrow-left"></i></button>
        </div>

        <div class="text-center mt-3">
          <button class="btn btn-test-success btn-lg" onclick="submitTest()" id="submitBtn"><i class="fas fa-check-circle"></i> إنهاء الاختبار</button>
        </div>
      </div>

      <div id="resultBox" class="result-box">
        <h3><i class="fas fa-trophy text-warning"></i> نتيجتك</h3>
        <div class="score" id="finalScore">10/10</div>
        <p class="lead" id="resultMessage">ممتاز! أنت متميز</p>
        <button class="btn btn-light" onclick="resetTest()"><i class="fas fa-redo"></i> إعادة الاختبار</button>
        <button class="btn btn-outline-light" onclick="alert('📄 سيتم تحميل النتيجة')"><i class="fas fa-download"></i> تحميل النتيجة</button>
      </div>
    </div>
  </section>

  <!-- ===== التذييل ===== -->
  <footer class="text-center">
    <div class="container">
      <p class="mb-0">© 2026 Mr. Yasser Nofal Academy – جميع الحقوق محفوظة</p>
    </div>
  </footer>

  <script>
    const questions = [
      { q: 'ما هو الفعل الماضي لكلمة "go"؟', options: ['Going', 'Went', 'Gone', 'Goes'], correct: 1 },
      { q: 'اختر الجملة الصحيحة:', options: ['She don\'t like coffee', 'She doesn\'t like coffee', 'She not like coffee', 'She no like coffee'], correct: 1 },
      { q: 'ما هو جمع كلمة "child"؟', options: ['Childs', 'Children', 'Childrens', 'Childes'], correct: 1 },
      { q: 'ما هو ضد كلمة "hot"؟', options: ['Warm', 'Cold', 'Cool', 'Freezing'], correct: 1 },
      { q: 'أي جملة تعبر عن المستقبل؟', options: ['I am eating', 'I ate', 'I will eat', 'I eat'], correct: 2 },
      { q: 'ما هو حرف الجر الصحيح: "She is good ____ math"?', options: ['In', 'At', 'On', 'For'], correct: 1 },
      { q: 'اختر الترجمة الصحيحة لـ "I am studying English":', options: ['أنا أدرس العربية', 'أنا أدرس الإنجليزية', 'أنا أدرس الفرنسية', 'أنا أدرس الألمانية'], correct: 1 },
      { q: 'ما هو الظرف الصحيح للجملة: "He runs ____"?', options: ['Quick', 'Quickly', 'Quicker', 'Quickest'], correct: 1 },
      { q: 'اختر الجملة الصحيحة في المضارع التام:', options: ['I have seen that movie', 'I have saw that movie', 'I has seen that movie', 'I seen that movie'], correct: 0 },
      { q: 'اختر الجملة الصحيحة:', options: ['He go to school', 'He goes to school', 'He going to school', 'He gone to school'], correct: 1 }
    ];

    let current = 0;
    let answers = new Array(questions.length).fill(null);

    function renderQuestion(index) {
      const q = questions[index];
      document.getElementById('questionText').textContent = q.q;
      document.getElementById('questionCounter').textContent = `${index+1} / ${questions.length}`;

      let html = '';
      q.options.forEach((opt, i) => {
        const checked = answers[index] === i ? 'checked' : '';
        html += `<div class="form-check"><input class="form-check-input" type="radio" name="q${index}" value="${i}" ${checked} onchange="saveAnswer(${index}, ${i})" /> <label class="form-check-label">${opt}</label></div>`;
      });
      document.getElementById('optionsContainer').innerHTML = html;

      document.getElementById('submitBtn').style.display = (index === questions.length - 1) ? 'inline-block' : 'none';
    }

    function saveAnswer(index, value) {
      answers[index] = value;
    }

    function nextQuestion() {
      if (current < questions.length - 1) { current++; renderQuestion(current); }
    }

    function prevQuestion() {
      if (current > 0) { current--; renderQuestion(current); }
    }

    function submitTest() {
      let correct = 0;
      questions.forEach((q, i) => { if (answers[i] === q.correct) correct++; });

      document.getElementById('testContainer').style.display = 'none';
      document.getElementById('resultBox').style.display = 'block';
      document.getElementById('finalScore').textContent = `${correct}/${questions.length}`;

      const pct = Math.round((correct / questions.length) * 100);
      let msg = pct >= 80 ? 'ممتاز! أنت متميز 🌟' : pct >= 60 ? 'جيد جداً! استمر 💪' : 'ننصحك بمراجعة الدروس 📖';
      document.getElementById('resultMessage').textContent = msg;

      // حفظ النتيجة في localStorage
      const results = JSON.parse(localStorage.getItem('testResults') || '[]');
      results.push({ date: new Date().toLocaleDateString('ar-EG'), score: `${correct}/${questions.length}`, percentage: pct });
      localStorage.setItem('testResults', JSON.stringify(results));

      alert(`✅ نتيجتك: ${correct}/${questions.length} (${pct}%)`);
    }

    function resetTest() {
      answers = new Array(questions.length).fill(null);
      current = 0;
      document.getElementById('testContainer').style.display = 'block';
      document.getElementById('resultBox').style.display = 'none';
      renderQuestion(0);
    }

    renderQuestion(0);
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/content-protection.js"></script>
</body>
</html>
