<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول – Mr. Yasser Nofal Academy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --primary: #0a2f6c; --secondary: #1a73e8; --accent: #f9a825; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Tajawal', sans-serif;
      background: linear-gradient(135deg, var(--primary), var(--secondary));
      min-height: 100vh;
      display: flex;
      align-items: center;
      padding-top: 80px;
    }
    .navbar-custom {
      background: var(--primary) !important;
      padding: 12px 0;
      box-shadow: 0 4px 15px rgba(0,0,0,0.2);
      position: fixed;
      top: 0;
      width: 100%;
      z-index: 999;
    }
    .navbar-brand { font-weight: 800; font-size: 1.6rem; color: #fff !important; }
    .navbar-brand span { color: var(--accent); }
    .nav-link { color: #fff !important; font-weight: 500; transition: 0.3s; }
    .nav-link:hover { color: var(--accent) !important; transform: translateY(-2px); }
    .login-card {
      background: #fff;
      border-radius: 30px;
      padding: 40px;
      max-width: 450px;
      width: 100%;
      margin: 0 auto;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
    }
    .login-card h4 { color: var(--primary); font-weight: 800; }
    .btn-login {
      background: var(--primary);
      color: #fff;
      border-radius: 50px;
      padding: 14px;
      font-weight: 700;
      width: 100%;
      border: none;
      transition: 0.3s;
    }
    .btn-login:hover { background: var(--secondary); transform: scale(1.02); box-shadow: 0 8px 25px rgba(26,115,232,0.3); }
    .login-card a { color: var(--secondary); font-weight: 700; text-decoration: none; }
    .login-card a:hover { color: var(--primary); }
    .alert-info { border-radius: 15px; }
  </style>
</head>
<body>

  <!-- ===== شريط التنقل ===== -->
  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <i class="fas fa-graduation-cap text-warning"></i> Mr. <span>Yasser</span> Nofal
      </a>
      <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">🏠 الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="levels.html">📚 المستويات</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html">🔑 تسجيل الدخول</a></li>
          <li class="nav-item"><a class="nav-link" href="register.html">📝 التسجيل</a></li>
          <li class="nav-item"><a class="nav-link" href="student-dashboard.html">👤 لوحة الطالب</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <!-- ===== المحتوى ===== -->
  <div class="container">
    <div class="login-card">
      <div class="text-center mb-4">
        <img src="assets/images/yasser.jpg" alt="Mr. Yasser Nofal" style="width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--accent);" />
        <h4 class="mt-2">Mr. Yasser Nofal Academy</h4>
        <p class="text-muted">🔐 تسجيل الدخول إلى حسابك</p>
      </div>

      <!-- رسالة توضيحية -->
      <div class="alert alert-info text-center py-2">
        <i class="fas fa-info-circle"></i> لديك حساب بالفعل؟ سجل دخولك هنا
      </div>

      <form onsubmit="handleLogin(event)">
        <div class="mb-3">
          <label class="form-label">البريد الإلكتروني</label>
          <input type="email" class="form-control" id="email" required placeholder="example@email.com" />
        </div>
        <div class="mb-3">
          <label class="form-label">كلمة المرور</label>
          <input type="password" class="form-control" id="password" required placeholder="••••••••" />
        </div>
        <button type="submit" class="btn-login"><i class="fas fa-sign-in-alt"></i> تسجيل الدخول</button>
      </form>

      <div class="text-center mt-3">
        <p>✅ ليس لديك حساب؟ <a href="register.html">سجل الآن مجاناً</a></p>
      </div>

      <div class="text-center mt-2">
        <small class="text-muted">
          <i class="fas fa-shield-alt"></i> بياناتك آمنة ومشفرة
        </small>
      </div>
    </div>
  </div>

  <script>
    function handleLogin(e) {
      e.preventDefault();
      const email = document.getElementById('email').value;
      const password = document.getElementById('password').value;

      // محاكاة التحقق من البيانات
      if (email && password) {
        // تخزين بيانات المستخدم
        const userData = {
          name: email.split('@')[0], // استخراج الاسم من الإيميل
          email: email,
          level: 'ثانوي',
          loginTime: new Date().toISOString()
        };
        localStorage.setItem('user', JSON.stringify(userData));
        
        // رسالة نجاح
        alert('✅ تم تسجيل الدخول بنجاح! مرحباً بك 👋');
        
        // التوجيه للوحة الطالب
        window.location.href = 'student-dashboard.html';
      } else {
        alert('❌ يرجى إدخال البريد الإلكتروني وكلمة المرور');
      }
    }
  </script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
  <script src="js/content-protection.js"></script>
</body>
</html>
