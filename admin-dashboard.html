<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة تحكم المدرب – أكاديمية مستر ياسر نوفل</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <style>
    :root { --primary: #0a2f6c; --secondary: #1a73e8; --accent: #f9a825; --light-bg: #f0f4fa; }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Tajawal', sans-serif; background: var(--light-bg); }
    .navbar-custom { background: var(--primary) !important; padding: 12px 0; box-shadow: 0 4px 15px rgba(0,0,0,0.2); }
    .navbar-brand { font-weight: 800; font-size: 1.6rem; color: #fff !important; }
    .navbar-brand span { color: var(--accent); }
    .nav-link { color: #fff !important; font-weight: 500; transition: 0.3s; }
    .nav-link:hover { color: var(--accent) !important; transform: translateY(-2px); }
    .dashboard-card { background: #fff; border-radius: 20px; padding: 25px; box-shadow: 0 6px 20px rgba(0,0,0,0.05); height: 100%; transition: 0.3s; }
    .dashboard-card:hover { transform: translateY(-3px); box-shadow: 0 12px 35px rgba(0,0,0,0.08); }
    .stat-number { font-size: 2.5rem; font-weight: 800; color: var(--primary); }
    .table-custom { background: #fff; border-radius: 15px; overflow: hidden; }
    footer { background: var(--primary); color: #ccc; padding: 35px 0; border-radius: 40px 40px 0 0; margin-top: 50px; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark navbar-custom">
    <div class="container">
      <a class="navbar-brand" href="index.html">
        <img src="assets/images/logo.png" alt="Logo" style="height: 35px; margin-left: 10px;" />
        <span>Yasser</span> Nofal
      </a>
      <div class="collapse navbar-collapse" id="navbarNav">
        <ul class="navbar-nav ms-auto">
          <li class="nav-item"><a class="nav-link" href="index.html">🏠 الرئيسية</a></li>
          <li class="nav-item"><a class="nav-link" href="admin-dashboard.html">📊 لوحة التحكم</a></li>
          <li class="nav-item"><a class="nav-link" href="login.html" onclick="localStorage.removeItem('admin');">🚪 خروج</a></li>
        </ul>
      </div>
    </div>
  </nav>

  <section class="container py-4">
    <h2 class="fw-bold mb-4"><i class="fas fa-chart-line text-primary"></i> لوحة تحكم المدرب</h2>

    <div class="row g-4">
      <div class="col-md-3"><div class="dashboard-card text-center"><div class="stat-number" id="totalBookings">0</div><p>إجمالي الحجوزات</p></div></div>
      <div class="col-md-3"><div class="dashboard-card text-center"><div class="stat-number" id="todayBookings">0</div><p>حجوزات اليوم</p></div></div>
      <div class="col-md-3"><div class="dashboard-card text-center"><div class="stat-number" id="pendingPayments">0</div><p>مدفوعات معلقة</p></div></div>
      <div class="col-md-3"><div class="dashboard-card text-center"><div class="stat-number" id="totalRevenue">0</div><p>إجمالي الإيرادات</p></div></div>
    </div>

    <div class="dashboard-card mt-4">
      <h5><i class="fas fa-list text-primary"></i> قائمة الحجوزات</h5>
      <div class="table-responsive">
        <table class="table table-striped table-custom">
          <thead>
            <tr><th>#</th><th>اسم الطالب</th><th>الصف</th><th>المدرسة</th><th>الباقة</th><th>طريقة الدفع</th><th>التاريخ</th></tr>
          </thead>
          <tbody id="bookingsTable"></tbody>
        </table>
      </div>
    </div>
  </section>

  <footer class="text-center"><div class="container"><p class="mb-0">© 2026 أكاديمية مستر ياسر نوفل – جميع الحقوق محفوظة</p></div></footer>

  <!-- ===== Firebase ===== -->
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>

  <script>
    // ===== إعدادات Firebase (استبدل ببياناتك الحقيقية) =====
    // Import the functions you need from the SDKs you need
import { initializeApp } from "firebase/app";
// TODO: Add SDKs for Firebase products that you want to use
// https://firebase.google.com/docs/web/setup#available-libraries

// Your web app's Firebase configuration
const firebaseConfig = {
  apiKey: "AIzaSyAFuAjSYHumAxJ_98AbYxFI8N9dSd27xL8",
  authDomain: "yasser-nofal-english-academy.firebaseapp.com",
  projectId: "yasser-nofal-english-academy",
  storageBucket: "yasser-nofal-english-academy.firebasestorage.app",
  messagingSenderId: "654488740819",
  appId: "1:654488740819:web:7a513cb6c2a74d98324526"
};

// Initialize Firebase
const app = initializeApp(firebaseConfig);

    // ===== تهيئة Firebase =====
    firebase.initializeApp(firebaseConfig);
    const database = firebase.database();

    // ===== التحقق من دخول المدرب =====
    if (!localStorage.getItem('admin')) {
      const adminPassword = prompt('🔐 أدخل كلمة مرور المدرب:');
      if (adminPassword === 'admin123') {
        localStorage.setItem('admin', 'true');
      } else {
        alert('❌ كلمة مرور خاطئة!');
        window.location.href = 'index.html';
      }
    }

    // ===== عرض الحجوزات من Firebase =====
    function loadBookingsFromFirebase() {
      const bookingsRef = database.ref('bookings');
      bookingsRef.on('value', (snapshot) => {
        const data = snapshot.val();
        if (data) {
          const bookings = Object.values(data);
          displayBookings(bookings);
        } else {
          displayBookings([]);
        }
      });
    }

    function displayBookings(bookings) {
      const table = document.getElementById('bookingsTable');
      const total = document.getElementById('totalBookings');
      const today = document.getElementById('todayBookings');

      total.textContent = bookings.length;

      const todayDate = new Date().toLocaleDateString('ar-EG');
      const todayCount = bookings.filter(b => new Date(b.date).toLocaleDateString('ar-EG') === todayDate).length;
      today.textContent = todayCount;

      if (bookings.length === 0) {
        table.innerHTML = `<tr><td colspan="7" class="text-center">لا توجد حجوزات حتى الآن</td></tr>`;
        return;
      }

      table.innerHTML = bookings.map((b, i) => `
        <tr>
          <td>${i+1}</td>
          <td>${b.studentName}</td>
          <td>${b.grade}</td>
          <td>${b.school}</td>
          <td>${b.price} ج.م</td>
          <td>${b.payment === 'instapay' ? 'انستاباي' : 'فودافون كاش'}</td>
          <td>${new Date(b.date).toLocaleDateString('ar-EG')}</td>
        </tr>
      `).join('');
    }

    // ===== تحميل البيانات عند فتح الصفحة =====
    loadBookingsFromFirebase();
  </script>
</body>
</html>
